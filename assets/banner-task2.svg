<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="16" fill="#1a0a1e"/>
  <rect x="2" y="2" width="796" height="176" rx="14" fill="none" stroke="url(#g1)" stroke-width="3"/>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#g1)">Task 2 — Sentiment Analysis</text>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#c0c0c0">1,500 Reviews • 3 Models • Positive/Neutral/Negative</text>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888">NLTK VADER • TextBlob • Logistic Regression</text>
  <circle r="3" fill="#f093fb" opacity="0.5">
    <animate attributeName="cx" values="120;680;120" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;150;30" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#f5576c" opacity="0.4">
    <animate attributeName="cx" values="680;120;680" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;30;150" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
