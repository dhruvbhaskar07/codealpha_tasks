<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffecd2"/>
      <stop offset="100%" stop-color="#fcb69f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="#1a1a2e"/>
  <rect x="2" y="2" width="796" height="196" rx="14" fill="none" stroke="url(#g1)" stroke-width="3"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="url(#g1)">CodeAlpha Data Analytics</text>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#e0e0e0">Internship Portfolio</text>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#a0a0a0">dhruvbhaskar07</text>
  <circle r="4" fill="#667eea" opacity="0.6">
    <animate attributeName="cx" values="100;700;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;170;30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#f093fb" opacity="0.4">
    <animate attributeName="cx" values="700;100;700" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="170;30;170" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#764ba2" opacity="0.5">
    <animate attributeName="cx" values="400;600;200;400" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;50;150;100" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
